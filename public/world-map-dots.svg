<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="rgba(255,255,255,0.15)"/>
    </pattern>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="50%" style="stop-color:#2d5a87"/>
      <stop offset="100%" style="stop-color:#3b7ab8"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#dots)"/>

  <!-- Simplified world map continents as dot clusters -->
  <g fill="rgba(255,255,255,0.25)">
    <!-- North America -->
    <circle cx="200" cy="180" r="3"/><circle cx="220" cy="160" r="3"/><circle cx="240" cy="170" r="3"/>
    <circle cx="180" cy="200" r="3"/><circle cx="200" cy="220" r="3"/><circle cx="220" cy="200" r="3"/>
    <circle cx="260" cy="180" r="3"/><circle cx="280" cy="190" r="3"/><circle cx="240" cy="210" r="3"/>
    <circle cx="160" cy="180" r="3"/><circle cx="300" cy="200" r="3"/><circle cx="320" cy="220" r="3"/>

    <!-- South America -->
    <circle cx="320" cy="350" r="3"/><circle cx="340" cy="370" r="3"/><circle cx="320" cy="390" r="3"/>
    <circle cx="300" cy="330" r="3"/><circle cx="340" cy="410" r="3"/><circle cx="320" cy="430" r="3"/>
    <circle cx="280" cy="350" r="3"/><circle cx="300" cy="400" r="3"/><circle cx="310" cy="450" r="3"/>

    <!-- Europe -->
    <circle cx="540" cy="160" r="3"/><circle cx="560" cy="140" r="3"/><circle cx="580" cy="150" r="3"/>
    <circle cx="520" cy="180" r="3"/><circle cx="540" cy="200" r="3"/><circle cx="560" cy="180" r="3"/>
    <circle cx="600" cy="160" r="3"/><circle cx="580" cy="190" r="3"/><circle cx="620" cy="170" r="3"/>

    <!-- Africa -->
    <circle cx="560" cy="280" r="3"/><circle cx="580" cy="300" r="3"/><circle cx="600" cy="280" r="3"/>
    <circle cx="540" cy="320" r="3"/><circle cx="560" cy="340" r="3"/><circle cx="580" cy="360" r="3"/>
    <circle cx="620" cy="300" r="3"/><circle cx="600" cy="340" r="3"/><circle cx="620" cy="380" r="3"/>
    <circle cx="560" cy="400" r="3"/><circle cx="580" cy="420" r="3"/><circle cx="600" cy="400" r="3"/>

    <!-- Asia -->
    <circle cx="700" cy="180" r="3"/><circle cx="720" cy="160" r="3"/><circle cx="740" cy="170" r="3"/>
    <circle cx="760" cy="150" r="3"/><circle cx="780" cy="180" r="3"/><circle cx="800" cy="160" r="3"/>
    <circle cx="680" cy="200" r="3"/><circle cx="700" cy="220" r="3"/><circle cx="720" cy="200" r="3"/>
    <circle cx="840" cy="170" r="3"/><circle cx="860" cy="190" r="3"/><circle cx="880" cy="180" r="3"/>
    <circle cx="900" cy="200" r="3"/><circle cx="920" cy="180" r="3"/><circle cx="940" cy="200" r="3"/>
    <circle cx="740" cy="230" r="3"/><circle cx="760" cy="250" r="3"/><circle cx="780" cy="240" r="3"/>
    <circle cx="820" cy="220" r="3"/><circle cx="800" cy="240" r="3"/><circle cx="840" cy="250" r="3"/>

    <!-- Australia -->
    <circle cx="920" cy="400" r="3"/><circle cx="940" cy="380" r="3"/><circle cx="960" cy="400" r="3"/>
    <circle cx="900" cy="420" r="3"/><circle cx="920" cy="440" r="3"/><circle cx="940" cy="420" r="3"/>
    <circle cx="980" cy="380" r="3"/><circle cx="960" cy="440" r="3"/><circle cx="1000" cy="400" r="3"/>
  </g>

  <!-- Connection lines suggesting global network -->
  <g stroke="rgba(255,255,255,0.08)" stroke-width="1" fill="none">
    <path d="M220,180 Q400,100 560,160"/>
    <path d="M560,160 Q700,100 800,180"/>
    <path d="M560,160 Q580,250 580,300"/>
    <path d="M800,180 Q880,300 940,400"/>
    <path d="M220,180 Q260,280 320,350"/>
  </g>
</svg>
